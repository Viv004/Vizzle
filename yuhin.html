          Quill.register(Font, true);

          const BlockEmbed = Quill.import('blots/block');
          class DividerBlot extends BlockEmbed {
            static create(){
              const node = super.create();
               node.setAttribute('style','width:50vh;border-top:0.5px solid black;height:0.5px;');
              return node;
            }
          }

          DividerBlot.blotName = 'divider';
          DividerBlot.tagName = 'hr';
          // Register the divider blot with Quill
          Quill.register(DividerBlot);
          // Define a custom blot for an image divider
          const Blockyy = Quill.import('blots/block');
          class ImageDividerBlot extends Blockyy {
              static create(value) {
                  const node = super.create();
                  node.setAttribute('style', 'display: block;margin: 20px auto;width: 94%; height: 50%;object-fit:fill;');
                  node.setAttribute('src', value); // Set the image source URL
                  return node;
              }
          }
          ImageDividerBlot.blotName = 'imageDivider';
          ImageDividerBlot.tagName = 'img';

          // Register the image divider blot with Quill
          Quill.register(ImageDividerBlot);


          const quill = new Quill('#editor',{
              modules:{
                  toolbar: '#toolbar',
              },
              theme:'snow'
          });
          window.quill = quill ;
          
          function insertDivider() {
              const range = quill.getSelection(); // Get the current selection
              if (range) {
                  quill.insertEmbed(range.index, 'divider', true); // Insert a divider
                  quill.setSelection(range.index + 1); // Move the cursor to the next line
              }
          }
          // Add an event listener to the button
        document.getElementById('add_divider').addEventListener('click',insertDivider);
        const toolbar = quill.getModule('toolbar');
          toolbar.addHandler('link', ()=>{
              const href = prompt('Enter the URL');
              const value = prompt('Enter the alt Text for the link');
              quill.insertText(quill.getSelection().index, value, 'link', href);

        impala_storage();
        async function impala_storage(){
           const q = query(collection(dbx, "Media"),where("userID","==","1MypDIE21yXyT8s4YFDDMXM0iqr1"));
          await getDocs(q).then((snapshot)=>{
              snapshot.forEach(doc=>{
                const ele = document.createElement('img');
                ele.src = doc.data().url ; 
                ele.addEventListener('click',()=>{
                  // Insert the image divider with the source URL of your image
                  quill.insertEmbed(quill.getSelection(), 'image', doc.data().url);
                  quill.setSelection(quill.getSelection() + 1); // Move the cursor to the next line
                });
                ele.style ="object-fit:fill;width:150px;height:210px;cursor:pointer;";
                document.getElementById('imagesx').appendChild(ele);
              })
          }).catch((e)=>{
            console.log(e);
          });
        }
