  <script>
    function Check(){
      var email = document.getElementById("email").value;
      if(email.endsWith("@kiit.ac.in")){

      }else{
        alert("Wrong Behenchod dfkf  ");

<body style="display: flex;gap: 15px;flex:2;flex-wrap: wrap;background-image: linear-gradient(rgb(25, 165, 165),white); padding: 12px ;background-repeat: no-repeat; background-size: cover;">

   <img src="./Vizzle_icon.png"    height="60px"/>
